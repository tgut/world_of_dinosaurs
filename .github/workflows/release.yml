name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  build:
    name: Build signed APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Decode the base64-encoded keystore from GitHub Secrets
      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 --decode > app/dino-release.jks
          echo "Keystore size: $(wc -c < app/dino-release.jks) bytes"
          file app/dino-release.jks

      # Build signed Google (GMS) release APK
      - name: Build Google release APK
        run: ./gradlew assembleGoogleRelease
        env:
          STOREFILE: dino-release.jks
          KEYALIAS: ${{ secrets.KEY_ALIAS }}
          KEYPASSWORD: ${{ secrets.KEY_PASSWORD }}
          STOREPASSWORD: ${{ secrets.STORE_PASSWORD }}

      # Build signed Huawei (HMS) release APK
      - name: Build Huawei release APK
        run: ./gradlew assembleHuaweiRelease
        env:
          STOREFILE: dino-release.jks
          KEYALIAS: ${{ secrets.KEY_ALIAS }}
          KEYPASSWORD: ${{ secrets.KEY_PASSWORD }}
          STOREPASSWORD: ${{ secrets.STORE_PASSWORD }}

      # Rename APKs to include flavor in the filename
      - name: Rename APKs
        run: |
          VERSION=${{ github.ref_name }}
          GOOGLE_APK=$(find app/build/outputs/apk/google/release -name "*.apk" | head -1)
          HUAWEI_APK=$(find app/build/outputs/apk/huawei/release -name "*.apk" | head -1)
          cp "$GOOGLE_APK" "world-of-dinosaurs-google-${VERSION}.apk"
          cp "$HUAWEI_APK" "world-of-dinosaurs-huawei-${VERSION}.apk"
          echo "google_apk=world-of-dinosaurs-google-${VERSION}.apk" >> $GITHUB_ENV
          echo "huawei_apk=world-of-dinosaurs-huawei-${VERSION}.apk" >> $GITHUB_ENV

      # Create GitHub Release and attach both APKs
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "World of Dinosaurs ${{ github.ref_name }}"
          body: |
            ## What's new
            <!-- fill in release notes here, or edit after release -->

            ## Download
            Two APK variants are available:

            | APK | For |
            |-----|-----|
            | `world-of-dinosaurs-google-*.apk` | Devices with Google Play Services (most Android phones) |
            | `world-of-dinosaurs-huawei-*.apk` | Huawei devices without GMS (Mate 40 and newer) |

            Install the APK directly on your Android device (Android 8.0+).
          files: |
            ${{ env.google_apk }}
            ${{ env.huawei_apk }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
